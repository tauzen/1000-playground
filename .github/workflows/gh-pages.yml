name: Deploy to gh-pages

on:
  push:
    branches-ignore:
      - gh-pages
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Valentine names from secrets
        run: |
          if [ -n "${{ secrets.VALENTINE_MAMA }}" ]; then
            sed -i "s/mama: 'Katarzyna'/mama: '${{ secrets.VALENTINE_MAMA }}'/" valentines-card/index.html
          fi
          if [ -n "${{ secrets.VALENTINE_CHILD }}" ]; then
            sed -i "s/child: 'Zosia'/child: '${{ secrets.VALENTINE_CHILD }}'/" valentines-card/index.html
          fi
          if [ -n "${{ secrets.VALENTINE_TATA }}" ]; then
            sed -i "s/tata: 'Tomasz'/tata: '${{ secrets.VALENTINE_TATA }}'/" valentines-card/index.html
          fi

      - name: Publish to gh-pages
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          publish_dir="$(mktemp -d)"
          rsync -a --delete --exclude '.git' ./ "$publish_dir/"

          deploy_dir="$(mktemp -d)"
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$deploy_dir"

          (
            cd "$deploy_dir"

            if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
              git checkout gh-pages
            else
              git checkout --orphan gh-pages
            fi

            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
            rsync -a --delete --exclude '.git' "$publish_dir/" ./

            touch .nojekyll
            git add --all

            if git diff --staged --quiet; then
              echo "No changes to publish"
              exit 0
            fi

            git commit -m "Deploy ${COMMIT_SHA} from ${BRANCH_NAME}"
            git push origin gh-pages
          )
