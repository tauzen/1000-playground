<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winamp Player Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #3a6ea5;
            font-family: 'Arial', sans-serif;
            user-select: none;
            min-height: 100vh;
        }

        /* ===== WINAMP CONTAINER ===== */
        #winamp {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ===== MAIN WINDOW ===== */
        .winamp-main {
            width: 275px;
            background: #232323;
            border-top: 1px solid #4a4a4a;
            border-left: 1px solid #4a4a4a;
            border-right: 1px solid #0a0a0a;
            border-bottom: 1px solid #0a0a0a;
            overflow: hidden;
        }

        /* Title bar */
        .title-bar {
            background: linear-gradient(180deg, #4a6a8a 0%, #3a5a7a 20%, #2a4a6a 50%, #1a3a5a 80%, #0a2a4a 100%);
            height: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3px;
            cursor: default;
        }

        .title-bar-text {
            font-size: 8px;
            color: #fff;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0 #000;
            flex: 1;
            text-align: center;
        }

        .title-btn {
            width: 9px;
            height: 9px;
            border: 1px solid #666;
            background: linear-gradient(180deg, #4a4a4a, #2a2a2a);
            font-size: 6px;
            color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            line-height: 1;
        }
        .title-btn:hover { background: linear-gradient(180deg, #5a5a5a, #3a3a3a); }
        .title-buttons { display: flex; gap: 1px; }

        /* ===== DISPLAY AREA ===== */
        .display-area {
            background: #000;
            margin: 3px 3px 0 3px;
            border-top: 1px solid #111;
            border-left: 1px solid #111;
            border-right: 1px solid #333;
            border-bottom: 1px solid #333;
            padding: 3px;
            height: 58px;
            overflow: hidden;
            position: relative;
        }

        .display-top-row {
            display: flex;
            height: 32px;
            gap: 4px;
        }

        #visualizer {
            width: 76px;
            height: 32px;
            image-rendering: pixelated;
            flex-shrink: 0;
        }

        .display-title-area {
            flex: 1;
            overflow: hidden;
            position: relative;
            height: 14px;
        }

        .scrolling-title {
            font-size: 8px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            white-space: nowrap;
            position: absolute;
            top: 1px;
            text-shadow: 0 0 4px rgba(0, 255, 0, 0.4);
            animation: scroll-title 12s linear infinite;
        }

        @keyframes scroll-title {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .display-meta-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 0;
        }

        .display-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 2px;
        }

        .display-bitrate {
            font-size: 7.5px;
            color: #00cc00;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 2px rgba(0, 200, 0, 0.3);
            display: flex;
            gap: 6px;
        }

        .display-bitrate .value {
            color: #00ee00;
            font-weight: bold;
        }

        .display-stereo {
            font-size: 7px;
            font-family: 'Courier New', monospace;
            display: flex;
            gap: 5px;
        }

        .display-stereo .active {
            color: #00ff00;
            text-shadow: 0 0 4px rgba(0, 255, 0, 0.5);
        }

        .display-stereo .inactive {
            color: #003300;
        }

        .display-bottom-row {
            display: flex;
            align-items: flex-end;
            margin-top: 1px;
            height: 18px;
        }

        .display-time-section {
            display: flex;
            align-items: center;
            gap: 2px;
            width: 80px;
        }

        .play-indicator {
            font-size: 7px;
            color: #00ff00;
            text-shadow: 0 0 3px rgba(0, 255, 0, 0.5);
            width: 8px;
        }

        .display-time {
            font-size: 18px;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 6px rgba(0, 255, 0, 0.4);
            letter-spacing: 1px;
            line-height: 1;
        }

        /* ===== SEEK BAR ===== */
        .seek-container {
            padding: 3px 5px 2px;
        }

        /* Shared slider styles */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 10px;
            background: transparent;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            height: 3px;
            background: linear-gradient(180deg, #222, #333, #222);
            border-top: 1px solid #111;
            border-bottom: 1px solid #444;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 28px;
            height: 10px;
            background: linear-gradient(180deg, #888 0%, #666 30%, #555 60%, #444 100%);
            border-top: 1px solid #999;
            border-left: 1px solid #999;
            border-right: 1px solid #222;
            border-bottom: 1px solid #222;
            margin-top: -4px;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-track {
            height: 3px;
            background: linear-gradient(180deg, #222, #333, #222);
            border-top: 1px solid #111;
            border-bottom: 1px solid #444;
        }

        input[type="range"]::-moz-range-thumb {
            width: 28px;
            height: 10px;
            background: linear-gradient(180deg, #888 0%, #666 30%, #555 60%, #444 100%);
            border-top: 1px solid #999;
            border-left: 1px solid #999;
            border-right: 1px solid #222;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }

        /* Seek bar specific */
        #seek-bar::-webkit-slider-thumb {
            width: 20px;
            height: 9px;
        }
        #seek-bar::-moz-range-thumb {
            width: 20px;
            height: 9px;
        }

        /* ===== VOLUME & BALANCE ===== */
        .controls-row-top {
            display: flex;
            align-items: center;
            padding: 0 5px 2px;
            gap: 3px;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .slider-group.volume {
            flex: 1.2;
        }

        .slider-group.balance {
            flex: 1;
        }

        .slider-label {
            font-size: 6px;
            color: #888;
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            width: 14px;
            height: 10px;
        }
        .slider-group input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 10px;
        }

        /* ===== TRANSPORT CONTROLS ===== */
        .transport-controls {
            display: flex;
            justify-content: center;
            gap: 1px;
            padding: 2px 5px 3px;
        }

        .transport-btn {
            width: 23px;
            height: 18px;
            background: linear-gradient(180deg, #4a4a4a 0%, #3a3a3a 30%, #2a2a2a 60%, #222 100%);
            border-top: 1px solid #666;
            border-left: 1px solid #666;
            border-right: 1px solid #111;
            border-bottom: 1px solid #111;
            color: #bbb;
            font-size: 9px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .transport-btn:hover {
            background: linear-gradient(180deg, #5a5a5a 0%, #4a4a4a 30%, #3a3a3a 60%, #333 100%);
            color: #fff;
        }

        .transport-btn:active {
            border-top: 1px solid #111;
            border-left: 1px solid #111;
            border-right: 1px solid #666;
            border-bottom: 1px solid #666;
            background: linear-gradient(180deg, #222 0%, #2a2a2a 30%, #3a3a3a 60%, #4a4a4a 100%);
        }

        .transport-btn.active {
            background: linear-gradient(180deg, #1a3a1a 0%, #0a2a0a 50%, #0a200a 100%);
            color: #0f0;
            border-top: 1px solid #111;
            border-left: 1px solid #111;
            border-right: 1px solid #444;
            border-bottom: 1px solid #444;
        }

        /* ===== TOGGLE BUTTONS ===== */
        .bottom-buttons {
            display: flex;
            justify-content: space-between;
            padding: 0 5px 4px;
        }

        .toggle-btn {
            font-size: 7px;
            color: #666;
            background: linear-gradient(180deg, #3a3a3a, #2a2a2a);
            border-top: 1px solid #555;
            border-left: 1px solid #555;
            border-right: 1px solid #111;
            border-bottom: 1px solid #111;
            padding: 1px 4px;
            cursor: pointer;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .toggle-btn.active {
            color: #00ff00;
            text-shadow: 0 0 4px rgba(0, 255, 0, 0.5);
        }

        .toggle-btn:hover { color: #aaa; }
        .toggle-btn.active:hover { color: #00ff00; }

        /* ===== EQUALIZER WINDOW ===== */
        .winamp-eq {
            width: 275px;
            background: #232323;
            border-left: 1px solid #4a4a4a;
            border-right: 1px solid #0a0a0a;
            border-bottom: 1px solid #0a0a0a;
            overflow: hidden;
            display: none;
        }

        .winamp-eq.visible { display: block; }

        .eq-title {
            background: linear-gradient(180deg, #4a6a8a 0%, #3a5a7a 20%, #2a4a6a 50%, #1a3a5a 80%, #0a2a4a 100%);
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
        }

        .eq-title span {
            font-size: 7px;
            color: #fff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .eq-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px 2px;
        }

        .eq-header-left {
            display: flex;
            gap: 3px;
        }

        .eq-presets-btn {
            font-size: 7px;
            color: #aaa;
            background: linear-gradient(180deg, #3a3a3a, #2a2a2a);
            border-top: 1px solid #555;
            border-left: 1px solid #555;
            border-right: 1px solid #111;
            border-bottom: 1px solid #111;
            padding: 1px 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .eq-presets-btn:hover { color: #fff; }

        .eq-body {
            display: flex;
            padding: 2px 8px 6px;
            gap: 2px;
            position: relative;
        }

        .eq-preamp-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            padding-right: 6px;
            border-right: 1px solid #333;
            margin-right: 2px;
            min-width: 28px;
        }

        .eq-preamp-section label {
            font-size: 5px;
            color: #888;
            letter-spacing: 0.5px;
        }

        .eq-sliders-section {
            display: flex;
            flex: 1;
            justify-content: space-between;
            position: relative;
            padding: 0 2px;
        }

        /* EQ grid lines */
        .eq-sliders-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background:
                linear-gradient(0deg,
                    transparent 0%,
                    transparent 23%, #333 23%, #333 24%, transparent 24%,
                    transparent 48%, #444 48%, #444 49%, transparent 49%,
                    transparent 73%, #333 73%, #333 74%, transparent 74%,
                    transparent 100%
                );
            pointer-events: none;
            z-index: 0;
        }

        .eq-db-labels {
            position: absolute;
            left: -4px;
            top: 0;
            height: 52px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            z-index: 2;
        }

        .eq-db-labels span {
            font-size: 5px;
            color: #666;
            font-family: 'Courier New', monospace;
        }

        .eq-band {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            z-index: 1;
        }

        .eq-band label {
            font-size: 5px;
            color: #888;
            font-family: 'Arial', sans-serif;
        }

        .eq-slider {
            writing-mode: vertical-lr;
            direction: rtl;
            height: 52px;
            width: 14px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        .eq-slider::-webkit-slider-runnable-track {
            width: 3px;
            background: linear-gradient(90deg, #222, #333, #222);
            border-left: 1px solid #111;
            border-right: 1px solid #444;
        }

        .eq-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px !important;
            height: 5px !important;
            background: linear-gradient(180deg, #8ab88a 0%, #5a9a5a 40%, #3a7a3a 100%);
            border-top: 1px solid #aaddaa;
            border-bottom: 1px solid #2a5a2a;
            margin-left: -6px;
            cursor: pointer;
        }

        .eq-slider::-moz-range-track {
            width: 3px;
            background: linear-gradient(90deg, #222, #333, #222);
            border-left: 1px solid #111;
            border-right: 1px solid #444;
        }

        .eq-slider::-moz-range-thumb {
            width: 14px !important;
            height: 5px !important;
            background: linear-gradient(180deg, #8ab88a 0%, #5a9a5a 40%, #3a7a3a 100%);
            border-top: 1px solid #aaddaa;
            border-bottom: 1px solid #2a5a2a;
            cursor: pointer;
        }

        #eq-preamp-slider {
            writing-mode: vertical-lr;
            direction: rtl;
            height: 52px;
            width: 14px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
        }

        #eq-preamp-slider::-webkit-slider-runnable-track {
            width: 3px;
            background: linear-gradient(90deg, #222, #333, #222);
            border-left: 1px solid #111;
            border-right: 1px solid #444;
        }

        #eq-preamp-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 5px;
            background: linear-gradient(180deg, #8ab88a 0%, #5a9a5a 40%, #3a7a3a 100%);
            border-top: 1px solid #aaddaa;
            border-bottom: 1px solid #2a5a2a;
            margin-left: -6px;
            cursor: pointer;
        }

        #eq-preamp-slider::-moz-range-track {
            width: 3px;
            background: linear-gradient(90deg, #222, #333, #222);
            border-left: 1px solid #111;
            border-right: 1px solid #444;
        }

        #eq-preamp-slider::-moz-range-thumb {
            width: 14px;
            height: 5px;
            background: linear-gradient(180deg, #8ab88a 0%, #5a9a5a 40%, #3a7a3a 100%);
            border-top: 1px solid #aaddaa;
            border-bottom: 1px solid #2a5a2a;
            cursor: pointer;
        }

        .eq-freq-labels {
            display: flex;
            justify-content: space-between;
            padding: 0 10px 4px 36px;
        }

        .eq-freq-labels span {
            font-size: 5px;
            color: #888;
            font-family: 'Arial', sans-serif;
            width: 18px;
            text-align: center;
        }

        /* ===== PLAYLIST WINDOW ===== */
        .winamp-playlist {
            width: 275px;
            background: #232323;
            border-left: 1px solid #4a4a4a;
            border-right: 1px solid #0a0a0a;
            border-bottom: 1px solid #0a0a0a;
            overflow: hidden;
        }

        .playlist-title {
            background: linear-gradient(180deg, #4a6a8a 0%, #3a5a7a 20%, #2a4a6a 50%, #1a3a5a 80%, #0a2a4a 100%);
            height: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .playlist-title span {
            font-size: 7px;
            color: #fff;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .playlist-tracks {
            background: #000;
            margin: 3px;
            border-top: 1px solid #111;
            border-left: 1px solid #111;
            border-right: 1px solid #333;
            border-bottom: 1px solid #333;
            max-height: 130px;
            overflow-y: auto;
            padding: 2px 0;
        }

        .playlist-tracks::-webkit-scrollbar {
            width: 10px;
        }

        .playlist-tracks::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-left: 1px solid #333;
        }

        .playlist-tracks::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4a4a4a, #333);
            border: 1px solid #555;
        }

        .track-item {
            padding: 1px 6px;
            font-size: 9px;
            font-family: 'Courier New', monospace;
            color: #00cc00;
            cursor: pointer;
            display: flex;
            gap: 4px;
            line-height: 1.5;
        }

        .track-item:hover {
            background: #0a2a0a;
        }

        .track-item.active {
            color: #fff;
            background: #00008b;
        }

        .track-item.active .track-num,
        .track-item.active .track-duration {
            color: #fff;
        }

        .track-item.playing {
            color: #fff;
        }

        .track-num {
            color: #00aa00;
            min-width: 16px;
            text-align: right;
        }

        .track-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .track-duration {
            color: #00aa00;
            min-width: 32px;
            text-align: right;
        }

        .playlist-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 3px 4px 5px;
        }

        .playlist-buttons {
            display: flex;
            gap: 2px;
        }

        .pl-btn {
            font-size: 7px;
            color: #aaa;
            background: linear-gradient(180deg, #3a3a3a, #2a2a2a);
            border-top: 1px solid #555;
            border-left: 1px solid #555;
            border-right: 1px solid #111;
            border-bottom: 1px solid #111;
            padding: 1px 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .pl-btn:hover { color: #fff; }

        .playlist-info-section {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .playlist-info {
            font-size: 7px;
            color: #00cc00;
            font-family: 'Courier New', monospace;
        }

        /* File input hidden */
        #file-input {
            display: none;
        }

        /* ===== ABOUT OVERLAY ===== */
        .about-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .about-overlay.visible {
            display: flex;
        }

        .about-window {
            background: #c0c0c0;
            border: 2px outset #dfdfdf;
            width: 300px;
            box-shadow: 3px 3px 0 #000;
        }

        .about-titlebar {
            background: linear-gradient(90deg, #000080, #1084d0);
            padding: 2px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .about-titlebar span {
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            font-family: 'Tahoma', sans-serif;
        }

        .about-close {
            width: 16px;
            height: 14px;
            background: #c0c0c0;
            border: 2px outset #dfdfdf;
            font-size: 10px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: 'Tahoma', sans-serif;
        }

        .about-close:active { border-style: inset; }

        .about-body {
            padding: 16px;
            text-align: center;
            font-family: 'Tahoma', 'MS Sans Serif', sans-serif;
            font-size: 11px;
        }

        .about-body h3 {
            font-size: 14px;
            margin-bottom: 8px;
            color: #000;
        }

        .about-body p {
            color: #333;
            margin: 4px 0;
        }

        .about-ok {
            margin-top: 12px;
            padding: 2px 20px;
            font-size: 11px;
            font-family: 'Tahoma', sans-serif;
            background: #c0c0c0;
            border: 2px outset #dfdfdf;
            cursor: pointer;
        }

        .about-ok:active { border-style: inset; }
    </style>
</head>
<body>
    <!-- About dialog -->
    <div class="about-overlay" id="about-overlay">
        <div class="about-window">
            <div class="about-titlebar">
                <span>About Winamp</span>
                <div class="about-close" onclick="closeAbout()">×</div>
            </div>
            <div class="about-body">
                <h3>Winamp Clone v1.0</h3>
                <p>A nostalgic recreation of the classic</p>
                <p>Winamp media player.</p>
                <p style="margin-top:8px; color:#888; font-size:9px;">Built with HTML, CSS & JavaScript</p>
                <p style="color:#888; font-size:9px;">Audio API: Web Audio + HTML5 Audio</p>
                <button class="about-ok" onclick="closeAbout()">OK</button>
            </div>
        </div>
    </div>

    <div id="winamp">
        <!-- Main Player Window -->
        <div class="winamp-main" id="main-window">
            <div class="title-bar" id="title-bar">
                <div class="title-buttons">
                    <div class="title-btn" onclick="showAbout()" title="About">?</div>
                </div>
                <span class="title-bar-text">WINAMP</span>
                <div class="title-buttons">
                    <div class="title-btn" title="Minimize">_</div>
                    <div class="title-btn" title="Window shade">□</div>
                </div>
            </div>

            <!-- Display -->
            <div class="display-area">
                <div class="display-top-row">
                    <canvas id="visualizer" width="76" height="32"></canvas>
                    <div class="display-meta-area">
                        <div class="display-title-area">
                            <span class="scrolling-title" id="scrolling-title">4. Crusher-P - Echo (3:50)</span>
                        </div>
                        <div class="display-meta-row">
                            <div class="display-bitrate">
                                <span><span class="value" id="bitrate-val">128</span> kbps</span>
                                <span><span class="value" id="freq-val">48</span> kHz</span>
                            </div>
                            <div class="display-stereo">
                                <span class="inactive" id="mono-indicator">mono</span>
                                <span class="active" id="stereo-indicator">stereo</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="display-bottom-row">
                    <div class="display-time-section">
                        <span class="play-indicator" id="play-indicator"></span>
                        <span class="display-time" id="time-display">00:00</span>
                    </div>
                </div>
            </div>

            <!-- Seek bar -->
            <div class="seek-container">
                <input type="range" id="seek-bar" min="0" max="100" value="0" title="Seek">
            </div>

            <!-- Volume / Balance -->
            <div class="controls-row-top">
                <div class="slider-group volume">
                    <input type="range" id="volume-slider" min="0" max="100" value="75" title="Volume">
                </div>
                <div class="slider-group balance">
                    <input type="range" id="balance-slider" min="-100" max="100" value="0" title="Balance">
                </div>
            </div>

            <!-- Transport buttons -->
            <div class="transport-controls">
                <button class="transport-btn" id="btn-prev" title="Previous">⏮</button>
                <button class="transport-btn" id="btn-play" title="Play">▶</button>
                <button class="transport-btn" id="btn-pause" title="Pause">⏸</button>
                <button class="transport-btn" id="btn-stop" title="Stop">⏹</button>
                <button class="transport-btn" id="btn-next" title="Next">⏭</button>
                <button class="transport-btn" id="btn-open" title="Open file">📂</button>
            </div>

            <!-- Bottom toggles -->
            <div class="bottom-buttons">
                <div style="display:flex;gap:2px;">
                    <button class="toggle-btn" id="btn-eq" title="Equalizer">EQ</button>
                    <button class="toggle-btn active" id="btn-pl" title="Playlist">PL</button>
                </div>
                <div style="display:flex;gap:2px;">
                    <button class="toggle-btn" id="btn-shuffle" title="Shuffle">SHUFFLE</button>
                    <button class="toggle-btn" id="btn-repeat" title="Repeat">REPEAT</button>
                </div>
            </div>
        </div>

        <!-- Equalizer Window -->
        <div class="winamp-eq" id="eq-window">
            <div class="eq-title"><span>WINAMP EQUALIZER</span></div>
            <div class="eq-header-row">
                <div class="eq-header-left">
                    <button class="toggle-btn active" id="eq-on-btn">ON</button>
                    <button class="toggle-btn" id="eq-auto-btn">AUTO</button>
                </div>
                <button class="eq-presets-btn" id="eq-presets-btn">PRESETS</button>
            </div>
            <div class="eq-body">
                <div class="eq-preamp-section">
                    <label>PREAMP</label>
                    <input type="range" id="eq-preamp-slider" class="eq-slider" min="-12" max="12" value="0">
                </div>
                <div class="eq-sliders-section" id="eq-bands">
                    <!-- Bands generated by JS -->
                </div>
            </div>
            <div class="eq-freq-labels" id="eq-freq-labels">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- Playlist Window -->
        <div class="winamp-playlist" id="playlist-window">
            <div class="playlist-title">
                <span>WINAMP PLAYLIST</span>
            </div>
            <div class="playlist-tracks" id="playlist-tracks">
                <!-- Tracks added dynamically -->
            </div>
            <div class="playlist-bottom">
                <div class="playlist-buttons">
                    <button class="pl-btn" id="pl-add-btn" title="Add files">ADD</button>
                    <button class="pl-btn" id="pl-rem-btn" title="Remove selected">REM</button>
                    <button class="pl-btn" id="pl-sel-btn" title="Select">SEL</button>
                    <button class="pl-btn" id="pl-misc-btn" title="Misc">MISC</button>
                </div>
                <div class="playlist-info-section">
                    <span class="playlist-info" id="playlist-total-time">0:00:00:00</span>
                    <span class="playlist-info" id="playlist-total-length">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <input type="file" id="file-input" accept="audio/*" multiple>

    <script>
    (function() {
        'use strict';

        // ===== STATE =====
        const state = {
            playlist: [],
            currentTrack: -1,
            isPlaying: false,
            isPaused: false,
            shuffle: false,
            repeat: false,
            eqEnabled: true,
            volume: 0.75,
            seekDragging: false
        };

        // ===== AUDIO ENGINE =====
        let audioContext = null;
        let audioElement = null;
        let sourceNode = null;
        let gainNode = null;
        let analyserNode = null;
        let pannerNode = null;
        let eqFilters = [];
        let audioConnected = false;

        const EQ_FREQUENCIES = [60, 170, 310, 600, 1000, 3000, 6000, 12000, 14000, 16000];
        const EQ_LABELS = ['70', '180', '320', '600', '1K', '3K', '6K', '12K', '14K', '16K'];

        function initAudio() {
            if (audioContext) return;

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            audioElement = new Audio();
            audioElement.crossOrigin = 'anonymous';

            gainNode = audioContext.createGain();
            gainNode.gain.value = state.volume;

            analyserNode = audioContext.createAnalyser();
            analyserNode.fftSize = 256;

            pannerNode = audioContext.createStereoPanner();

            // Create EQ filters
            EQ_FREQUENCIES.forEach((freq, i) => {
                const filter = audioContext.createBiquadFilter();
                filter.type = i === 0 ? 'lowshelf' : i === EQ_FREQUENCIES.length - 1 ? 'highshelf' : 'peaking';
                filter.frequency.value = freq;
                filter.gain.value = 0;
                filter.Q.value = 1;
                eqFilters.push(filter);
            });

            audioElement.addEventListener('timeupdate', onTimeUpdate);
            audioElement.addEventListener('ended', onTrackEnded);
            audioElement.addEventListener('loadedmetadata', onMetadataLoaded);
            audioElement.addEventListener('error', onAudioError);
        }

        function connectAudioGraph() {
            if (audioConnected) return;
            try {
                sourceNode = audioContext.createMediaElementSource(audioElement);
            } catch (e) {
                return;
            }

            let chain = sourceNode;

            if (state.eqEnabled) {
                eqFilters.forEach(filter => {
                    chain.connect(filter);
                    chain = filter;
                });
            }

            chain.connect(gainNode);
            gainNode.connect(pannerNode);
            pannerNode.connect(analyserNode);
            analyserNode.connect(audioContext.destination);

            audioConnected = true;
        }

        // ===== PLAYBACK =====
        function playTrack(index) {
            if (index < 0 || index >= state.playlist.length) return;

            initAudio();
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            state.currentTrack = index;
            const track = state.playlist[index];

            audioElement.src = track.url;
            audioElement.load();

            connectAudioGraph();

            audioElement.play().then(() => {
                state.isPlaying = true;
                state.isPaused = false;
                updateUI();
            }).catch(err => {
                console.error('Playback error:', err);
            });

            updateDisplayTrackInfo(track, index);
            updateScrollingTitle(track, index);
            highlightTrack(index);
        }

        function togglePlay() {
            if (state.playlist.length === 0) return;

            initAudio();
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            if (!state.isPlaying && !state.isPaused) {
                playTrack(state.currentTrack >= 0 ? state.currentTrack : 0);
            } else if (state.isPaused) {
                audioElement.play();
                state.isPlaying = true;
                state.isPaused = false;
                updateUI();
            }
        }

        function pause() {
            if (!state.isPlaying) return;
            audioElement.pause();
            state.isPaused = true;
            state.isPlaying = false;
            updateUI();
        }

        function stop() {
            if (!audioElement) return;
            audioElement.pause();
            audioElement.currentTime = 0;
            state.isPlaying = false;
            state.isPaused = false;
            updateUI();
        }

        function prevTrack() {
            if (state.playlist.length === 0) return;
            let idx = state.currentTrack - 1;
            if (idx < 0) idx = state.playlist.length - 1;
            playTrack(idx);
        }

        function nextTrack() {
            if (state.playlist.length === 0) return;
            let idx;
            if (state.shuffle) {
                idx = Math.floor(Math.random() * state.playlist.length);
            } else {
                idx = state.currentTrack + 1;
                if (idx >= state.playlist.length) {
                    if (state.repeat) {
                        idx = 0;
                    } else {
                        stop();
                        return;
                    }
                }
            }
            playTrack(idx);
        }

        // ===== EVENT HANDLERS =====
        function onTimeUpdate() {
            if (state.seekDragging) return;
            const current = audioElement.currentTime;
            const duration = audioElement.duration || 0;

            document.getElementById('time-display').textContent = formatTime(current);
            if (duration > 0) {
                document.getElementById('seek-bar').value = (current / duration) * 100;
            }

            updatePlaylistTimeDisplay();
        }

        function onTrackEnded() {
            nextTrack();
        }

        function onMetadataLoaded() {
            const duration = audioElement.duration;
            if (state.currentTrack >= 0 && state.playlist[state.currentTrack]) {
                state.playlist[state.currentTrack].duration = duration;
                renderPlaylist();
                updateDisplayTrackInfo(state.playlist[state.currentTrack], state.currentTrack);
                updateScrollingTitle(state.playlist[state.currentTrack], state.currentTrack);
            }
        }

        function onAudioError(e) {
            console.error('Audio error:', e);
            document.getElementById('scrolling-title').textContent =
                '*** Error loading track ***';
        }

        // ===== PLAYLIST MANAGEMENT =====
        function addTrack(name, url) {
            state.playlist.push({ name, url, duration: 0 });
            renderPlaylist();
            if (state.playlist.length === 1) {
                state.currentTrack = 0;
                highlightTrack(0);
                updateDisplayTrackInfo(state.playlist[0], 0);
                updateScrollingTitle(state.playlist[0], 0);
            }
        }

        function removeTrack(index) {
            state.playlist.splice(index, 1);
            if (state.currentTrack === index) {
                stop();
                state.currentTrack = Math.min(index, state.playlist.length - 1);
            } else if (state.currentTrack > index) {
                state.currentTrack--;
            }
            renderPlaylist();
        }

        function clearPlaylist() {
            stop();
            state.playlist = [];
            state.currentTrack = -1;
            renderPlaylist();
            document.getElementById('scrolling-title').textContent =
                '*** WINAMP CLONE - Open files or use the playlist ***';
            document.getElementById('time-display').textContent = '00:00';
            document.getElementById('play-indicator').textContent = '';
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (file.type.startsWith('audio/') || file.name.match(/\.(mp3|wav|ogg|flac|m4a|aac|wma)$/i)) {
                    const url = URL.createObjectURL(file);
                    const name = file.name.replace(/\.[^.]+$/, '');
                    addTrack(name, url);
                }
            });
        }

        // ===== RENDERING =====
        function updateDisplayTrackInfo(track, index) {
            const durationStr = track.duration ? formatTime(track.duration) : '--:--';
            // The display info is now shown via the scrolling title
        }

        function updateScrollingTitle(track, index) {
            const durationStr = track.duration ? formatTime(track.duration) : '--:--';
            const el = document.getElementById('scrolling-title');
            el.textContent = `${index + 1}. ${track.name} (${durationStr})`;
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-tracks');
            container.innerHTML = '';

            state.playlist.forEach((track, i) => {
                const el = document.createElement('div');
                el.className = 'track-item' + (i === state.currentTrack ? ' active' : '');
                el.innerHTML = `
                    <span class="track-num">${i + 1}.</span>
                    <span class="track-name">${escapeHtml(track.name)}</span>
                    <span class="track-duration">${track.duration ? formatTimeDuration(track.duration) : '--:--'}</span>
                `;
                el.addEventListener('dblclick', () => playTrack(i));
                el.addEventListener('click', () => {
                    document.querySelectorAll('.track-item').forEach(t => t.classList.remove('active'));
                    el.classList.add('active');
                });
                container.appendChild(el);
            });

            updatePlaylistInfo();
        }

        function highlightTrack(index) {
            document.querySelectorAll('.track-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
                el.classList.toggle('playing', i === index && state.isPlaying);
            });
        }

        function updateUI() {
            document.getElementById('btn-play').classList.toggle('active', state.isPlaying);
            document.getElementById('btn-pause').classList.toggle('active', state.isPaused);
            highlightTrack(state.currentTrack);

            // Update play indicator
            const indicator = document.getElementById('play-indicator');
            if (state.isPlaying) {
                indicator.textContent = '\u25B6';
            } else if (state.isPaused) {
                indicator.textContent = '\u275A\u275A';
            } else {
                indicator.textContent = '';
            }

            if (!state.isPlaying && !state.isPaused) {
                document.getElementById('time-display').textContent = '00:00';
                document.getElementById('seek-bar').value = 0;
            }
        }

        function updatePlaylistInfo() {
            const total = state.playlist.reduce((sum, t) => sum + (t.duration || 0), 0);
            document.getElementById('playlist-total-length').textContent =
                formatTimeLong(total);
        }

        function updatePlaylistTimeDisplay() {
            if (audioElement && audioElement.currentTime) {
                document.getElementById('playlist-total-time').textContent =
                    formatTimeWithHours(audioElement.currentTime);
            }
        }

        // ===== EQUALIZER =====
        function buildEQ() {
            const container = document.getElementById('eq-bands');
            container.innerHTML = '';

            EQ_LABELS.forEach((label, i) => {
                const band = document.createElement('div');
                band.className = 'eq-band';
                band.innerHTML = `
                    <input type="range" class="eq-slider" min="-12" max="12" value="0"
                           data-band="${i}" title="${label}">
                `;
                band.querySelector('input').addEventListener('input', (e) => {
                    if (eqFilters[i]) {
                        eqFilters[i].gain.value = parseFloat(e.target.value);
                    }
                });
                container.appendChild(band);
            });

            // Build frequency labels
            const labelsContainer = document.getElementById('eq-freq-labels');
            labelsContainer.innerHTML = '';
            EQ_LABELS.forEach(label => {
                const span = document.createElement('span');
                span.textContent = label;
                labelsContainer.appendChild(span);
            });
        }

        // ===== VISUALIZER =====
        const visCanvas = document.getElementById('visualizer');
        const visCtx = visCanvas.getContext('2d');
        let visMode = 0;

        function drawVisualizer() {
            requestAnimationFrame(drawVisualizer);

            if (!analyserNode || !state.isPlaying) {
                visCtx.fillStyle = '#000';
                visCtx.fillRect(0, 0, visCanvas.width, visCanvas.height);
                if (!state.isPlaying) return;
            }

            const bufferLength = analyserNode.frequencyBinCount;

            if (visMode === 0) {
                const dataArray = new Uint8Array(bufferLength);
                analyserNode.getByteFrequencyData(dataArray);

                visCtx.fillStyle = '#000';
                visCtx.fillRect(0, 0, visCanvas.width, visCanvas.height);

                const barCount = 20;
                const barWidth = Math.floor(visCanvas.width / barCount);

                for (let i = 0; i < barCount; i++) {
                    const dataIndex = Math.floor(i * bufferLength / barCount);
                    const value = dataArray[dataIndex];
                    const barHeight = (value / 255) * visCanvas.height;

                    const segments = Math.floor(barHeight / 2);
                    for (let s = 0; s < segments; s++) {
                        const y = visCanvas.height - (s * 2) - 2;
                        const ratio = s / (visCanvas.height / 2);
                        let r, g;
                        if (ratio < 0.6) {
                            r = Math.floor(ratio * 1.5 * 80);
                            g = 200;
                        } else if (ratio < 0.85) {
                            r = Math.floor(180 + (ratio - 0.6) * 300);
                            g = 200;
                        } else {
                            r = 255;
                            g = Math.floor(200 * (1 - (ratio - 0.85) * 4));
                        }
                        visCtx.fillStyle = `rgb(${r}, ${g}, 0)`;
                        visCtx.fillRect(i * barWidth, y, barWidth - 1, 1);
                    }
                }
            } else {
                const dataArray = new Uint8Array(bufferLength);
                analyserNode.getByteTimeDomainData(dataArray);

                visCtx.fillStyle = '#000';
                visCtx.fillRect(0, 0, visCanvas.width, visCanvas.height);

                visCtx.lineWidth = 1;
                visCtx.strokeStyle = '#00ff00';
                visCtx.beginPath();

                const sliceWidth = visCanvas.width / bufferLength;
                let x = 0;

                for (let i = 0; i < bufferLength; i++) {
                    const v = dataArray[i] / 128.0;
                    const y = (v * visCanvas.height) / 2;

                    if (i === 0) {
                        visCtx.moveTo(x, y);
                    } else {
                        visCtx.lineTo(x, y);
                    }
                    x += sliceWidth;
                }

                visCtx.stroke();
            }
        }

        // ===== WIRE UP CONTROLS =====

        // Transport
        document.getElementById('btn-play').addEventListener('click', togglePlay);
        document.getElementById('btn-pause').addEventListener('click', pause);
        document.getElementById('btn-stop').addEventListener('click', stop);
        document.getElementById('btn-prev').addEventListener('click', prevTrack);
        document.getElementById('btn-next').addEventListener('click', nextTrack);
        document.getElementById('btn-open').addEventListener('click', () => {
            document.getElementById('file-input').click();
        });

        document.getElementById('file-input').addEventListener('change', (e) => {
            handleFiles(e.target.files);
            e.target.value = '';
        });

        // Volume
        document.getElementById('volume-slider').addEventListener('input', (e) => {
            state.volume = e.target.value / 100;
            if (gainNode) gainNode.gain.value = state.volume;
        });

        // Balance
        document.getElementById('balance-slider').addEventListener('input', (e) => {
            if (pannerNode) pannerNode.pan.value = e.target.value / 100;
        });

        // Seek
        const seekBar = document.getElementById('seek-bar');
        seekBar.addEventListener('mousedown', () => { state.seekDragging = true; });
        seekBar.addEventListener('input', (e) => {
            if (audioElement && audioElement.duration) {
                audioElement.currentTime = (e.target.value / 100) * audioElement.duration;
            }
        });
        seekBar.addEventListener('mouseup', () => { state.seekDragging = false; });
        seekBar.addEventListener('touchstart', () => { state.seekDragging = true; });
        seekBar.addEventListener('touchend', () => { state.seekDragging = false; });

        // Shuffle / Repeat
        document.getElementById('btn-shuffle').addEventListener('click', function() {
            state.shuffle = !state.shuffle;
            this.classList.toggle('active', state.shuffle);
        });

        document.getElementById('btn-repeat').addEventListener('click', function() {
            state.repeat = !state.repeat;
            this.classList.toggle('active', state.repeat);
        });

        // EQ toggle
        document.getElementById('btn-eq').addEventListener('click', function() {
            const eq = document.getElementById('eq-window');
            eq.classList.toggle('visible');
            this.classList.toggle('active', eq.classList.contains('visible'));
        });

        // PL toggle
        document.getElementById('btn-pl').addEventListener('click', function() {
            const pl = document.getElementById('playlist-window');
            const isVisible = pl.style.display !== 'none';
            pl.style.display = isVisible ? 'none' : 'block';
            this.classList.toggle('active', !isVisible);
        });

        // EQ on/off
        document.getElementById('eq-on-btn').addEventListener('click', function() {
            state.eqEnabled = !state.eqEnabled;
            this.classList.toggle('active', state.eqEnabled);
        });

        // EQ preamp
        document.getElementById('eq-preamp-slider').addEventListener('input', (e) => {
            if (gainNode) {
                const preampGain = Math.pow(10, parseFloat(e.target.value) / 20);
                gainNode.gain.value = state.volume * preampGain;
            }
        });

        // Playlist buttons
        document.getElementById('pl-add-btn').addEventListener('click', () => {
            document.getElementById('file-input').click();
        });
        document.getElementById('pl-rem-btn').addEventListener('click', () => {
            const active = document.querySelector('.track-item.active');
            if (active) {
                const idx = Array.from(active.parentNode.children).indexOf(active);
                removeTrack(idx);
            }
        });

        // Visualizer click to toggle mode
        visCanvas.addEventListener('click', () => {
            visMode = (visMode + 1) % 2;
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case ' ':
                    e.preventDefault();
                    state.isPlaying ? pause() : togglePlay();
                    break;
                case 'ArrowRight':
                    if (audioElement) audioElement.currentTime += 5;
                    break;
                case 'ArrowLeft':
                    if (audioElement) audioElement.currentTime -= 5;
                    break;
                case 'ArrowUp':
                    state.volume = Math.min(1, state.volume + 0.05);
                    if (gainNode) gainNode.gain.value = state.volume;
                    document.getElementById('volume-slider').value = state.volume * 100;
                    break;
                case 'ArrowDown':
                    state.volume = Math.max(0, state.volume - 0.05);
                    if (gainNode) gainNode.gain.value = state.volume;
                    document.getElementById('volume-slider').value = state.volume * 100;
                    break;
            }
        });

        // ===== ABOUT =====
        window.showAbout = function() {
            document.getElementById('about-overlay').classList.add('visible');
        };
        window.closeAbout = function() {
            document.getElementById('about-overlay').classList.remove('visible');
        };

        // ===== UTILITIES =====
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '00:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0');
        }

        function formatTimeDuration(seconds) {
            if (!seconds || isNaN(seconds)) return '--:--';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + s.toString().padStart(2, '0');
        }

        function formatTimeLong(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return m + ':' + s.toString().padStart(2, '0');
        }

        function formatTimeWithHours(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00:00:00';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            const ms = Math.floor((seconds % 1) * 100);
            return h + ':' + m.toString().padStart(2, '0') + ':' + s.toString().padStart(2, '0') + ':' + ms.toString().padStart(2, '0');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== INIT =====
        buildEQ();
        drawVisualizer();

        // Load bundled demo tracks
        const demoTracks = [
            { name: 'Mori Calliope - Go-Getters', file: '01 - Chiptune Dreams.mp3' },
            { name: 'CircusP - Goodbye', file: '02 - Ambient Waves.mp3' },
            { name: 'AmaLee - Siren', file: '01 - Chiptune Dreams.mp3' },
            { name: 'Crusher-P - Echo', file: '02 - Ambient Waves.mp3' },
            { name: 'M83 - Midnight City', file: '01 - Chiptune Dreams.mp3' },
            { name: 'Sunnexo - Please Wait', file: '02 - Ambient Waves.mp3' },
            { name: 'Omaru Polka - Persona', file: '01 - Chiptune Dreams.mp3' }
        ];

        // Pre-assign durations matching the reference image
        const demoDurations = [195, 204, 242, 230, 243, 255, 296];

        demoTracks.forEach((track, i) => {
            state.playlist.push({ name: track.name, url: track.file, duration: demoDurations[i] });
        });

        // Set initial state: track 4 selected (Crusher-P - Echo)
        state.currentTrack = 3;
        renderPlaylist();

        const initTrack = state.playlist[state.currentTrack];
        updateScrollingTitle(initTrack, state.currentTrack);
        document.getElementById('time-display').textContent = '01:15';

    })();
